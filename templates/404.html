{% extends 'base.html' %}

{% block title %}Página no encontrada{% endblock %}

{% block content %}
<div style="display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 80px 20px; min-height: 50vh;">
    <div style="width: 120px; height: 120px; border-radius: 50%; background: var(--color-bg-page); display: flex; align-items: center; justify-content: center; margin-bottom: var(--spacing-xl);">
        <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="color: var(--color-text-light);">
            <circle cx="12" cy="12" r="10"></circle>
            <line x1="12" y1="8" x2="12" y2="12"></line>
            <line x1="12" y1="16" x2="12.01" y2="16"></line>
        </svg>
    </div>
    <h1 style="font-family: var(--font-heading); font-size: 4rem; font-weight: 800; color: var(--color-text); margin: 0; line-height: 1;">404</h1>
    <h2 style="font-family: var(--font-heading); font-size: 1.5rem; color: var(--color-text); margin-top: var(--spacing-sm);">Página no encontrada</h2>
    <p style="color: var(--color-text-light); max-width: 400px; margin-top: var(--spacing-md); line-height: 1.6;">
        La página que buscas no existe o ha sido movida. Verifica la URL o vuelve al inicio.
    </p>
    <a href="{% url 'home' %}" style="display: inline-flex; align-items: center; gap: var(--spacing-sm); margin-top: var(--spacing-xl); padding: 14px 28px; background: var(--color-primary); color: white; font-size: var(--font-size-base); font-weight: 600; border: none; border-radius: 12px; text-decoration: none;">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
            <polyline points="9 22 9 12 15 12 15 22"></polyline>
        </svg>
        Volver al inicio
    </a>
</div>
{% endblock %}
